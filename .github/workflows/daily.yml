name: Daily Commit

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 24f1002699@ds.study.iitm.ac.in
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          date > status.txt
          git add status.txt
          git commit -m "Daily update: $(date -u)"
          git push
